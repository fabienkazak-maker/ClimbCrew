<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClimbCrew</title>
    <style>
      [data-login-logo-enhanced="true"] {
        width: clamp(140px, 24vw, 220px) !important;
        max-width: 100% !important;
        height: auto !important;
      }

      [data-login-action-wrapper="true"] {
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        width: 100% !important;
        margin-top: 12px !important;
      }

      [data-login-primary-action="true"] {
        display: inline-flex !important;
        justify-content: center !important;
        align-items: center !important;
        min-width: 180px !important;
        width: auto !important;
        min-height: 46px !important;
        margin-inline: auto !important;
        padding: 10px 22px !important;
        border: 2px solid #333 !important;
        border-radius: 12px !important;
        background: #fff !important;
        color: #000 !important;
        font: inherit !important;
        line-height: 1.15 !important;
        box-shadow: none !important;
      }

      [data-sidebar-logout="true"] {
        width: 100% !important;
        margin-top: 12px !important;
      }

      .login-default-account {
        width: min(100% - 32px, 420px);
        margin: 24px auto 0;
        padding: 12px 14px;
        border-radius: 8px;
        text-align: center;
        font-size: 0.92rem;
        line-height: 1.45;
        color: inherit;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
    <script type="module">
      const root = document.getElementById("root");
      const textToRemove = "Connexion requise pour accéder à l’application.";
      let scheduled = false;

      const textOf = (element) => element.textContent.trim().replace(/\s+/g, " ");
      const normalizedTextOf = (element) => textOf(element).toLowerCase();
      const buttons = () => Array.from(document.querySelectorAll("button"));
      const findButtonByText = (text) => buttons().find((button) => normalizedTextOf(button) === text);

      const isDefaultAccountText = (text) => (
        text.includes("compte par défaut")
        && text.includes("climbcrew@gmail.com")
        && text.includes("climbcrew*2026")
        && text.includes("ceci est un compte de test")
      );

      const removeNativeDefaultAccountInfo = () => {
        const candidates = Array.from(document.querySelectorAll("body *"))
          .filter((element) => (
            !element.classList.contains("login-default-account")
            && !element.closest(".login-default-account")
            && !element.querySelector(".login-default-account")
            && isDefaultAccountText(normalizedTextOf(element))
          ))
          .sort((a, b) => textOf(a).length - textOf(b).length);

        candidates.forEach((element) => {
          if (!document.body.contains(element)) return;
          const hasSmallerCandidate = candidates.some((candidate) => candidate !== element && element.contains(candidate));
          if (!hasSmallerCandidate) element.remove();
        });
      };

      const addDefaultAccountInfo = (submitButton, loginPanel) => {
        document.querySelectorAll(".login-default-account").forEach((block) => block.remove());

        const accountInfo = document.createElement("div");
        accountInfo.className = "login-default-account";
        accountInfo.innerHTML = `
          <strong>Compte par défaut</strong><br>
          Email : climbcrew@gmail.com<br>
          Mot de passe : climbcrew*2026<br>
          Ceci est un compte de test
        `;

        const submitWrapper = submitButton.parentElement;
        const target = submitWrapper?.parentElement || loginPanel;
        target.appendChild(accountInfo);
      };

      const commonAncestor = (elements) => {
        if (elements.length === 0) return null;
        const [first, ...rest] = elements;
        const ancestors = [];
        let current = first.parentElement;
        while (current && current !== document.body) {
          ancestors.push(current);
          current = current.parentElement;
        }
        return ancestors.find((ancestor) => rest.every((element) => ancestor.contains(element))) || null;
      };

      const moveLogoutToMenu = () => {
        const logoutButton = buttons().find((button) => /^(déconnexion|deconnexion)$/i.test(textOf(button)));
        if (!logoutButton) return;

        const menuLabels = ["inscriptions", "participants", "voies", "progression", "administration", "statistiques", "faq"];
        const menuButtons = buttons().filter((button) => menuLabels.includes(normalizedTextOf(button)));
        const menu = commonAncestor(menuButtons) || document.querySelector("aside, nav, [class*='sidebar'], [class*='menu']");

        if (!menu || menu.contains(logoutButton)) return;
        logoutButton.dataset.sidebarLogout = "true";
        menu.appendChild(logoutButton);
      };

      const enhanceLoginPage = () => {
        document.querySelectorAll("body *").forEach((element) => {
          if (element.childNodes.length === 1 && textOf(element) === textToRemove) {
            element.remove();
          }
        });

        moveLogoutToMenu();

        const submitButton = findButtonByText("se connecter");
        if (!submitButton) {
          document.querySelectorAll(".login-default-account").forEach((block) => block.remove());
          return;
        }

        submitButton.classList.remove("secondary", "outline", "ghost");
        submitButton.dataset.loginPrimaryAction = "true";

        if (submitButton.parentElement) {
          submitButton.parentElement.dataset.loginActionWrapper = "true";
        }

        const loginPanel = submitButton.closest("form")?.parentElement
          || submitButton.closest(".card")
          || root;

        loginPanel.querySelectorAll("img, svg, [class*='logo'], [class*='Logo']").forEach((logo) => {
          logo.dataset.loginLogoEnhanced = "true";
        });

        loginPanel.querySelectorAll("h1").forEach((title) => {
          if (/^climbcrew$/i.test(textOf(title))) {
            title.remove();
          }
        });

        removeNativeDefaultAccountInfo();
        addDefaultAccountInfo(submitButton, loginPanel);
        removeNativeDefaultAccountInfo();
      };

      const scheduleEnhancement = () => {
        if (scheduled) return;
        scheduled = true;
        requestAnimationFrame(() => {
          scheduled = false;
          enhanceLoginPage();
        });
      };

      scheduleEnhancement();
      new MutationObserver(scheduleEnhancement).observe(root, {
        childList: true,
        subtree: true,
      });
    </script>
  </body>
</html>
