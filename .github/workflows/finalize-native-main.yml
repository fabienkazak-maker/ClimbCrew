name: Finalize native ClimbCrew main

on:
  push:
    branches: [main]
    paths:
      - tools/finalize-native-main.mjs
      - .github/workflows/finalize-native-main.yml
      - .github/finalize-native-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ !contains(github.event.head_commit.message, '[native-finalized]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Finalize source code
        run: node tools/finalize-native-main.mjs

      - name: Commit native implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No change to commit."
            exit 0
          fi
          git commit -m "Intégrer les évolutions dans main et retirer la simulation [native-finalized]"
          git push origin main
