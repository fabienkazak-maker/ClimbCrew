name: Deploy local ClimbCrew server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: climbcrew-local-deploy
  cancel-in-progress: true

jobs:
  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy-local:
    name: Deploy on self-hosted Windows runner
    needs: validate-frontend
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy local HTTPS server
        shell: cmd
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\.github\scripts\deploy-local.ps1
