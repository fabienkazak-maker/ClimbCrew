name: Validate ClimbCrew Linux

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: climbcrew-linux-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Linux build and runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Build frontend
        run: |
          if ! bun run build > /tmp/climbcrew-build.log 2>&1; then
            tail -n 120 /tmp/climbcrew-build.log
            exit 1
          fi
      - name: Validate Docker Compose
        run: CLIMBCREW_ENV_FILE=.env.production.example docker compose --env-file .env.production.example -f docker-compose.prod.yml config

  e2e:
    name: Validate API and browsers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install browsers
        run: bun x playwright install --with-deps chromium firefox
      - name: Run complete test matrix
        run: bun run test:e2e
