services:
  db:
    image: postgres:16-alpine
    container_name: climbcrew-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB manquant}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER manquant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant}
    volumes:
      - climbcrew_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: climbcrew-backend:prod
    container_name: climbcrew-backend
    restart: unless-stopped
    env_file:
      - ${CLIMBCREW_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL manquant}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN manquant}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: climbcrew-frontend:prod
    container_name: climbcrew-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  climbcrew_pgdata:
