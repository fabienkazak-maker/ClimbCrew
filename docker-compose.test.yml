services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: climbcrew_test
      POSTGRES_USER: climbcrew_test
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:?TEST_DB_PASSWORD manquant}
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climbcrew_test -d climbcrew_test"]
      interval: 2s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgres://climbcrew_test:${TEST_DB_PASSWORD}@db:5432/climbcrew_test
      CORS_ORIGIN: http://127.0.0.1:${TEST_FRONTEND_PORT}
      SECURE_COOKIES: "false"
      COOKIE_SAMESITE: lax
      SETUP_TOKEN: ${TEST_SETUP_TOKEN:?TEST_SETUP_TOKEN manquant}
      FIRST_ADMIN_EMAIL: ${TEST_ADMIN_EMAIL:?TEST_ADMIN_EMAIL manquant}
      FIRST_ADMIN_PASSWORD: ${TEST_ADMIN_PASSWORD:?TEST_ADMIN_PASSWORD manquant}
      BCRYPT_ROUNDS: 10
      SESSION_DURATION_DAYS: 1
      WRITE_RATE_LIMIT_PER_MINUTE: 500
    ports:
      - "127.0.0.1:${TEST_BACKEND_PORT}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 3s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    ports:
      - "127.0.0.1:${TEST_FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 3s
      timeout: 3s
      retries: 20
