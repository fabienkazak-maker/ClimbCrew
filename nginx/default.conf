# ClimbCrew - reverse proxy HTTPS local
# Le port 80 est conservé pour rediriger proprement vers HTTPS.
# En local Windows, docker-compose mappe 443 -> 8443 pour éviter les droits administrateur.

server {
    listen 80;
    server_name localhost climbcrew.local _;

    return 301 https://localhost:8443$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost climbcrew.local _;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # En-têtes de sécurité côté interface.
    # HSTS est volontairement désactivé en local avec certificat auto-signé afin d'éviter
    # de bloquer le navigateur si le certificat est renouvelé. Active-le en production.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-CSRF-Token $http_x_csrf_token;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        try_files $uri /index.html;
    }
}
