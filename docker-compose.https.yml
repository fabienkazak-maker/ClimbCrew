services:
  db:
    image: postgres:16
    container_name: climbcrew-db-local
    environment:
      POSTGRES_DB: app_local
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    volumes:
      - pgdata_server:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_local"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: climbcrew-backend-local:secure-https
    container_name: climbcrew-backend-local
    command: sh -c "node seed-local.js && npm start"
    environment:
      NODE_ENV: local
      PORT: 3000
      DATABASE_URL: postgres://app:app_password@db:5432/app_local
      PG_SSL: "false"
      TRUST_PROXY: 1
      CORS_ORIGIN: https://localhost:8443,http://localhost:8080,http://localhost:5173,https://localhost:5173
      SECURE_COOKIES: "true"
      COOKIE_SAMESITE: lax
      SESSION_COOKIE_NAME: climbcrew_session
      SETUP_TOKEN: local-setup
      DEV_ADMIN_ENABLED: "true"
      DEV_ADMIN_EMAIL: admin@test.local
      DEV_ADMIN_PASSWORD: admin
      FIRST_ADMIN_EMAIL: admin@test.local
      FIRST_ADMIN_PASSWORD: admin
      ALLOW_WEAK_FIRST_ADMIN_PASSWORD: "true"
      BCRYPT_ROUNDS: 10
      AUTO_IMPORT_DATA: "true"
      MAX_JSON_BODY_SIZE: 10mb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: climbcrew-nginx-local
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./certs/localhost.crt:/etc/nginx/certs/localhost.crt:ro
      - ./certs/localhost.key:/etc/nginx/certs/localhost.key:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata_server:
