<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e3a5f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>ClimbCrew</title>
    <style>
      [data-login-logo-enhanced="true"] {
        width: clamp(140px, 24vw, 220px) !important;
        max-width: 100% !important;
        height: auto !important;
      }

      [data-login-action-wrapper="true"] {
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        width: 100% !important;
        margin-top: 12px !important;
      }

      [data-login-primary-action="true"] {
        display: inline-flex !important;
        justify-content: center !important;
        align-items: center !important;
        min-width: 180px !important;
        width: auto !important;
        min-height: 46px !important;
        margin-inline: auto !important;
        padding: 10px 22px !important;
        border: 2px solid #333 !important;
        border-radius: 12px !important;
        background: #fff !important;
        color: #000 !important;
        font: inherit !important;
        line-height: 1.15 !important;
        box-shadow: none !important;
      }

      [data-sidebar-logout="true"] {
        display: flex !important;
        align-items: center !important;
        justify-content: flex-start !important;
        width: 100% !important;
        min-height: 46px !important;
        margin-top: 12px !important;
        padding: 12px 16px !important;
        border: 1px solid rgba(148, 163, 184, 0.24) !important;
        border-radius: 12px !important;
        background: rgba(31, 45, 64, 0.96) !important;
        color: #d8e1ee !important;
        font: inherit !important;
        font-weight: 700 !important;
        line-height: 1.15 !important;
        text-align: left !important;
        box-shadow: none !important;
      }

      .login-default-account {
        width: min(100% - 32px, 420px);
        margin: 24px auto 0;
        padding: 12px 14px;
        border-radius: 8px;
        text-align: center;
        font-size: 0.92rem;
        line-height: 1.45;
        color: inherit;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="module">
      const root = document.getElementById("root");
      const textToRemove = "Connexion requise pour accéder à l’application.";
            let scheduled = false;

      const textOf = (element) => element.textContent.trim().replace(/\s+/g, " ");
      const normalizedTextOf = (element) => textOf(element).toLowerCase();
      const buttons = () => Array.from(document.querySelectorAll("button"));
      const allElements = () => Array.from(document.querySelectorAll("body *"));
      const findButtonByText = (text) => buttons().find((button) => normalizedTextOf(button) === text);

      const sidebarLabels = ["inscriptions", "voies", "progression", "administration", "statistiques", "faq"];

      const scoreSidebarLabels = (element) => {
        const text = normalizedTextOf(element);
        return sidebarLabels.reduce((score, label) => score + (text.includes(label) ? 1 : 0), 0);
      };

      const findSidebarLabelElement = (label) => allElements()
        .filter((element) => normalizedTextOf(element) === label)
        .sort((left, right) => left.getBoundingClientRect().width - right.getBoundingClientRect().width)[0];

      const isPlausibleSidebar = (element) => {
        if (!element || element === document.body || element === root) return false;
        const rect = element.getBoundingClientRect();
        return scoreSidebarLabels(element) >= 4
          && rect.left <= 48
          && rect.width >= 180
          && rect.width <= 460
          && rect.height >= 220;
      };

      const findSidebarMenu = () => {
        const faqElement = findSidebarLabelElement("faq");
        let current = faqElement?.parentElement;

        while (current && current !== document.body && current !== root) {
          if (isPlausibleSidebar(current)) return current;
          current = current.parentElement;
        }

        return allElements()
          .filter(isPlausibleSidebar)
          .sort((left, right) => {
            const scoreDiff = scoreSidebarLabels(right) - scoreSidebarLabels(left);
            if (scoreDiff !== 0) return scoreDiff;
            return left.getBoundingClientRect().width - right.getBoundingClientRect().width;
          })[0] || null;
      };

      const findLogoutButton = () => buttons().find((button) => /déconnexion|deconnexion/i.test(textOf(button)));

      const moveLogoutToSidebar = () => {
        const logoutButton = findLogoutButton();
        if (!logoutButton) return;

        const sidebarMenu = findSidebarMenu();
        if (!sidebarMenu) return;

        logoutButton.dataset.sidebarLogout = "true";
        if (sidebarMenu.contains(logoutButton)) return;

        const previousParent = logoutButton.parentElement;
        sidebarMenu.appendChild(logoutButton);

        if (previousParent && previousParent !== sidebarMenu && previousParent.childElementCount === 0 && textOf(previousParent) === "") {
          previousParent.remove();
        }
      };

      const enhanceLoginLogo = (loginPanel) => {
        loginPanel.querySelectorAll("img, svg, [class*='logo'], [class*='Logo']").forEach((logo) => {
          logo.dataset.loginLogoEnhanced = "true";
        });
      };

      const removeDefaultAccountCopies = () => {
        document.querySelectorAll(".login-default-account").forEach((block) => block.remove());
      };

      const addDefaultAccountInfo = () => {
        removeDefaultAccountCopies();
      };

      const enhanceLoginPage = () => {
        document.querySelectorAll("body *").forEach((element) => {
          if (element.childNodes.length === 1 && textOf(element) === textToRemove) {
            element.remove();
          }
        });

        document.querySelectorAll(".login-cristal-title").forEach((block) => block.remove());
        moveLogoutToSidebar();

        const submitButton = findButtonByText("se connecter");
        if (!submitButton) {
          document.querySelectorAll(".login-default-account").forEach((block) => block.remove());
          return;
        }

        submitButton.classList.remove("secondary", "outline", "ghost");
        submitButton.dataset.loginPrimaryAction = "true";

        if (submitButton.parentElement) {
          submitButton.parentElement.dataset.loginActionWrapper = "true";
        }

        const loginPanel = submitButton.closest("form")?.parentElement
          || submitButton.closest(".card")
          || root;

        enhanceLoginLogo(loginPanel);

        loginPanel.querySelectorAll("h1").forEach((title) => {
          if (/^climbcrew$/i.test(textOf(title))) {
            title.remove();
          }
        });

        addDefaultAccountInfo(submitButton, loginPanel);
      };

      const scheduleEnhancement = () => {
        if (scheduled) return;
        scheduled = true;
        requestAnimationFrame(() => {
          scheduled = false;
          enhanceLoginPage();
        });
      };

      scheduleEnhancement();
      new MutationObserver(scheduleEnhancement).observe(root, {
        childList: true,
        subtree: true,
      });
    </script>
  </body>
</html>
